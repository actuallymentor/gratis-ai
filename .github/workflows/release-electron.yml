# Build, sign, notarize, and publish Electron app to GitHub Releases
# when a version bump lands on main.
#
# Signing secrets are optional — when absent (e.g. in forks), unsigned
# builds are produced instead. See README CI/CD section for the full table.

name: Release Electron

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

concurrency:
  group: release-electron
  cancel-in-progress: true

jobs:
  # ── Gate: only proceed when the version string actually changed ──
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare version with latest release
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURR=$(node -p "require('./package.json').version")
          PREV=$(gh release view --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || echo "")
          echo "latest-release=$PREV curr=$CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURR" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Create a GitHub Release with the version tag ──
  create-release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download gratisAI

            Click the link for your device to start downloading:

            - 🍎 [**Mac (Apple Silicon)**](https://github.com/${{ github.repository }}/releases/latest/download/gratisAI-mac.dmg) — M1, M2, M3, M4 Macs
            - 🪟 [**Windows**](https://github.com/${{ github.repository }}/releases/latest/download/gratisAI-win.exe)
            - 🐧 [**Linux**](https://github.com/${{ github.repository }}/releases/latest/download/gratisAI-linux.AppImage)

            <details><summary>Intel Mac</summary>

            - 🍎 [**Mac (Intel)**](https://github.com/${{ github.repository }}/releases/latest/download/gratisAI-mac-intel.dmg) — older Intel-based Macs

            </details>

            ---

  # ── Build matrix: macOS (arm64+x64), Windows (x64), Linux (x64) ──
  build:
    needs: [check-version, create-release]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # ── Get Electron version for targeted cache keys ──
      - name: Get Electron version
        id: electron-version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').devDependencies.electron")" >> "$GITHUB_OUTPUT"

      # ── Caching: Electron binary + electron-builder packaging tools ──
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ matrix.platform }}-${{ steps.electron-version.outputs.version }}
          restore-keys: electron-${{ matrix.platform }}-

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ matrix.platform }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-builder-${{ matrix.platform }}-

      # ── Detect whether code signing secrets are available ──
      - name: Detect code signing availability
        id: signing
        shell: bash
        run: |
          [ -n "$MAC_CERT" ] && echo "can-sign-mac=true" >> "$GITHUB_OUTPUT" \
                             || echo "can-sign-mac=false" >> "$GITHUB_OUTPUT"
          [ -n "$WIN_CERT" ] && echo "can-sign-win=true" >> "$GITHUB_OUTPUT" \
                             || echo "can-sign-win=false" >> "$GITHUB_OUTPUT"

          # Warn when the current platform lacks its signing secret
          if [ "$PLATFORM" = "mac" ] && [ -z "$MAC_CERT" ]; then
            echo "::warning::No signing secrets found for mac — building unsigned"
          elif [ "$PLATFORM" = "win" ] && [ -z "$WIN_CERT" ]; then
            echo "::warning::No signing secrets found for win — building unsigned"
          fi
        env:
          PLATFORM: ${{ matrix.platform }}
          MAC_CERT: ${{ secrets.MAC_CERTIFICATE_P12 }}
          WIN_CERT: ${{ secrets.WIN_CERTIFICATE_PFX }}

      # macOS: import Developer ID certificate for codesigning
      - name: Import macOS codesign certificate
        if: matrix.platform == 'mac' && steps.signing.outputs.can-sign-mac == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx electron-vite build
        env:
          VITE_GITHUB_REPO: ${{ github.repository }}

      - name: Package with electron-builder (macOS signed)
        if: matrix.platform == 'mac' && steps.signing.outputs.can-sign-mac == 'true'
        run: npx electron-builder --mac --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package with electron-builder (Windows signed)
        if: matrix.platform == 'win' && steps.signing.outputs.can-sign-win == 'true'
        run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE_PFX }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Package with electron-builder (unsigned)
        if: matrix.platform == 'linux' || (matrix.platform == 'mac' && steps.signing.outputs.can-sign-mac != 'true') || (matrix.platform == 'win' && steps.signing.outputs.can-sign-win != 'true')
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Rename mac assets to user-friendly names (arm64 → default, x64 → intel)
      - name: Rename macOS assets
        if: matrix.platform == 'mac'
        run: |
          cd release
          mv gratisAI-mac-arm64.dmg gratisAI-mac.dmg
          mv gratisAI-mac-x64.dmg gratisAI-mac-intel.dmg
          mv gratisAI-mac-arm64.zip gratisAI-mac.zip
          mv gratisAI-mac-x64.zip gratisAI-mac-intel.zip
          sed -i '' 's/gratisAI-mac-arm64/gratisAI-mac/g; s/gratisAI-mac-x64/gratisAI-mac-intel/g' latest*.yml

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/latest*.yml
